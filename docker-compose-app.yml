services:
  app:
    build: .
    container_name: messanger-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5437/messanger_db
      SPRING_DATASOURCE_USERNAME: messanger_user
      SPRING_DATASOURCE_PASSWORD: messanger_pass
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
